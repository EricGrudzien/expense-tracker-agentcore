<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker — Categories</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="categories.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>💸 Expense Tracker</h1>
      <nav class="page-nav">
        <a href="index.html" class="nav-tab">Reports</a>
        <a href="query.html" class="nav-tab">Query</a>
        <a href="categories.html" class="nav-tab nav-tab--active">Categories</a>
        <a href="chat.html" class="nav-tab">Chat</a>
      </nav>
    </header>

    <!-- Add Category -->
    <section class="card">
      <h2>Add New Category</h2>
      <form id="add-category-form" novalidate autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label for="new-slug">Slug</label>
            <input type="text" id="new-slug" placeholder="e.g. parking" maxlength="50" required />
            <span class="field-hint">Lowercase letters, numbers, underscores. Used internally.</span>
            <span class="field-error" id="new-slug-error"></span>
          </div>
          <div class="form-group form-group--grow">
            <label for="new-label">Display Label</label>
            <input type="text" id="new-label" placeholder="e.g. Parking" maxlength="100" required />
            <span class="field-error" id="new-label-error"></span>
          </div>
          <div class="form-group form-group--icon">
            <label for="new-icon">Icon</label>
            <input type="text" id="new-icon" placeholder="e.g. 🅿️" maxlength="10" />
            <span class="field-hint">Emoji (optional)</span>
          </div>
        </div>
        <div id="add-form-error" class="form-error hidden"></div>
        <button type="submit" id="add-btn">Add Category</button>
      </form>
    </section>

    <!-- Category List -->
    <section class="card">
      <h2>Manage Categories</h2>
      <div id="cat-loading" class="loading hidden">Loading…</div>
      <div id="cat-empty" class="empty-state hidden">No categories found.</div>
      <div id="cat-list"></div>
    </section>
  </div>

  <script src="categories.js"></script>
</body>
</html>
